{% extends "base.html" %}
{% block title %}Student Profile{% endblock %}
{% block content %}

<h2 class="mb-3">My Profile</h2>

<form method="post" enctype="multipart/form-data" class="card card-body">

  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <input class="form-control" name="full_name" value="{{ student.full_name }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">College ID</label>
    <input class="form-control" value="{{ student.college_id }}" disabled>
  </div>

  <div class="mb-3">
    <label class="form-label">Phone</label>
    <input class="form-control" name="phone" value="{{ student.phone or '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Department</label>
    <input class="form-control" name="department" value="{{ student.department or '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">CGPA</label>
    <input class="form-control" name="cgpa" type="number" step="0.01" min="0" max="10" value="{{ student.cgpa or '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Batch Year</label>
    <input class="form-control" name="batch_year" type="number" value="{{ student.batch_year or '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Resume (PDF/DOC/DOCX)</label>
    <input class="form-control" type="file" name="resume">
    {% if student.resume_filename %}
      <div class="mt-2">
        Current Resume:
        <a href="{{ url_for('static', filename='uploads/' ~ student.resume_filename) }}" target="_blank">
          {{ student.resume_filename }}
        </a>
      </div>
    {% endif %}
  </div>

  <button class="btn btn-primary">Save Profile</button>
  <a class="btn btn-secondary" href="{{ url_for('student.dashboard') }}">Back</a>
</form>

{% endblock %}
