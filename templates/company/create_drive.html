{% extends "base.html" %}
{% block title %}Create Drive{% endblock %}
{% block content %}
<h3 class="mb-3">Create Placement Drive</h3>

<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">Job Title *</label>
    <input class="form-control" name="job_title" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Job Description *</label>
    <textarea class="form-control" name="job_description" rows="4" required></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Eligibility Criteria</label>
    <textarea class="form-control" name="eligibility_criteria" rows="3"></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Application Deadline *</label>
    <input class="form-control" name="deadline" type="date" required>
  </div>

  <button class="btn btn-primary">Create & Send for Approval</button>
  <a class="btn btn-secondary" href="{{ url_for('company.dashboard') }}">Cancel</a>
</form>
{% endblock %}
