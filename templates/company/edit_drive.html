{% extends "base.html" %}
{% block title %}Edit Drive{% endblock %}
{% block content %}
<h3 class="mb-3">Edit Placement Drive</h3>

<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">Job Title *</label>
    <input class="form-control" name="job_title" value="{{ drive.job_title }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Job Description *</label>
    <textarea class="form-control" name="job_description" rows="4" required>{{ drive.job_description }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Eligibility Criteria</label>
    <textarea class="form-control" name="eligibility_criteria" rows="3">{{ drive.eligibility_criteria }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Application Deadline *</label>
    <input class="form-control" name="deadline" type="date" value="{{ drive.deadline }}" required>
  </div>

  <button class="btn btn-primary">Save Changes</button>
  <a class="btn btn-secondary" href="{{ url_for('company.dashboard') }}">Cancel</a>
</form>
{% endblock %}
